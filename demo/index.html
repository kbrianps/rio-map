<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>rio-map · demo</title>
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />
    <link rel="dns-prefetch" href="https://b.basemaps.cartocdn.com" />
    <link rel="dns-prefetch" href="https://c.basemaps.cartocdn.com" />
    <link rel="dns-prefetch" href="https://d.basemaps.cartocdn.com" />
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; background: #f8fafc; }
      #map { position: absolute; inset: 0; }
      #controls {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        background: white; border-radius: 10px; padding: 8px 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        font-size: 13px;
      }
      button { font: inherit; cursor: pointer; padding: 4px 10px; border: 1px solid #ccc; border-radius: 6px; background: white; margin-right: 4px; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="controls">
      <button id="recenter">Recentrar</button>
      <button id="zoom-in">+</button>
      <button id="zoom-out">−</button>
      <span id="info" style="margin-left: 8px; color: #64748b;"></span>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
